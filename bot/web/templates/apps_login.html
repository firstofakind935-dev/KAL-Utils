{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-12 col-sm-8 col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-header text-white text-center py-3" style="background:#27AE60;">
        <h5 class="mb-0">📋 KAL Applications Console</h5>
      </div>
      <div class="card-body p-4">
        <form method="post">
          <div class="mb-3">
            <label for="password" class="form-label fw-semibold">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-control"
              placeholder="Enter applications password"
              autofocus
              required
            >
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-success">Login</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
