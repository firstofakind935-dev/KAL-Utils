<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flight Schedule — Korean Air VA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020d1f;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 60px;
      background: rgba(2, 13, 31, 0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      text-decoration: none;
    }
    .nav-logo-icon {
      width: 36px;
      height: 36px;
      background: #00A4E4;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.85rem;
      color: #fff;
      flex-shrink: 0;
    }
    .nav-logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }
    .nav-logo-text strong {
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
    }
    .nav-logo-text small {
      font-size: 0.65rem;
      color: #7aa0c4;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      list-style: none;
    }
    .nav-links a {
      color: #a0b8d0;
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .nav-links a:hover { color: #fff; background: rgba(255,255,255,0.06); }
    .nav-links a.active {
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.05);
    }

    /* ── Hero ── */
    .hero {
      background: radial-gradient(ellipse at 50% 0%, #0a2a4a 0%, #020d1f 65%);
      padding: 5rem 2rem 4rem;
      text-align: center;
    }
    .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7aa0c4;
      border: 1px solid rgba(122,160,196,0.4);
      border-radius: 999px;
      padding: 0.3rem 0.85rem;
      margin-bottom: 1.25rem;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      color: #fff;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }
    .subtitle {
      font-size: 1rem;
      color: #7aa0c4;
    }

    /* ── Flights section ── */
    .flights-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* Table */
    .flights-table {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      overflow: hidden;
    }
    .table-header, .table-row {
      display: grid;
      grid-template-columns: 110px 1fr 140px 180px 1fr;
      gap: 1rem;
      padding: 0.85rem 1.25rem;
      align-items: center;
    }
    .table-header {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #4a6a88;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .table-row {
      font-size: 0.875rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }
    .table-row:last-child { border-bottom: none; }
    .table-row:hover { background: rgba(255,255,255,0.03); }
    .flight-number {
      font-weight: 700;
      color: #00A4E4;
      font-size: 0.95rem;
    }
    .route { color: #e2e8f0; }
    .aircraft { color: #a0b8d0; }
    .dep-time { color: #a0b8d0; font-variant-numeric: tabular-nums; }
    .captain { color: #a0b8d0; }

    /* Empty state */
    .empty-state {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 4rem 2rem;
      text-align: center;
    }
    .empty-icon { font-size: 2.5rem; display: block; margin-bottom: 1rem; }
    .empty-state h2 { font-size: 1.15rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
    .empty-state p { font-size: 0.875rem; color: #4a6a88; }

    /* Info box */
    .info-box {
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      border-left: 3px solid #00A4E4;
      background: rgba(0,164,228,0.05);
      border-radius: 0 8px 8px 0;
      font-size: 0.825rem;
      color: #7aa0c4;
    }

    @media (max-width: 700px) {
      .table-header { display: none; }
      .table-row {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
        gap: 0.35rem 1rem;
      }
      .flight-number { grid-column: 1; grid-row: 1; }
      .route         { grid-column: 2; grid-row: 1; }
      .aircraft      { grid-column: 1; grid-row: 2; }
      .dep-time      { grid-column: 2; grid-row: 2; }
      .captain       { grid-column: 1 / -1; grid-row: 3; color: #4a6a88; font-size: 0.8rem; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="#">
      <div class="nav-logo-icon">KA</div>
      <div class="nav-logo-text">
        <strong>Korean Air</strong>
        <small>Virtual Airline • ATC24</small>
      </div>
    </a>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#" class="active">Schedule</a></li>
    </ul>
  </nav>

  {% block content %}{% endblock %}
</body>
</html>
